<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alocação de Staffs - Sistema de Treinamentos</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    
</head>
<body>

    <div id="AREA_IMPRESSAO_EXCLUSIVA"></div>

    <div class="sidebar" id="sidebar">
        <!-- Menu carregado dinamicamente -->
    </div>

    <div class="main-content">
        <header class="page-header">
            <h1 class="page-title">Alocação de Staffs</h1>
        </header>

        <div class="alocacao-page-content h-full">
            <div class="bento-grid-container">
                <!-- COLUNA 1: CALENDÁRIO (2 Meses) -->
                <div class="bento-card bento-area-calendar">
                    <div class="bento-card-header">
                        <div class="bento-title"><i class="fas fa-calendar-alt"></i> Agendamento</div>
                    </div>
                    <div class="bento-card-body scrollable">
                        <div id="calendarContainer" class="calendar-wrapper"></div>
                    </div>
                </div>

                <!-- COLUNA 2: STAFFS DISPONÍVEIS (Grande) -->
                <div class="bento-card bento-area-staffs highlight-accent">
                    <div class="bento-card-header">
                        <div class="bento-title"><i class="fas fa-users-cog"></i> Equipe Disponível</div>
                    </div>
                    <div class="bento-card-body scrollable">
                        <div id="staffsContainer" class="bento-list-container"></div>
                    </div>
                </div>

                <!-- COLUNA 3: CRONOGRAMA OPERACIONAL -->
                <div class="bento-card bento-area-main highlight-blue">
                    <div class="bento-card-header">
                        <div class="bento-title"><i class="fas fa-project-diagram"></i> Painel de Operations Diárias</div>
                    </div>
                    <div class="bento-card-body no-padding scrollable-x">
                        <div id="treinamentosContainer" class="bento-timeline-row"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

    <!-- Painel Lateral de Detalhes do Treinamento (Substituindo o modal central) -->
<div id="sidePanelTreinamento" class="side-panel-overlay" style="display: none;">
    <div class="side-panel-content">
        <div class="side-panel-header">
            <h2 id="sidePanelTitle">Detalhes do Treinamento</h2>
            <button type="button" class="close-side-panel" onclick="fecharSidePanel()">&times;</button>
        </div>

        <div class="modal-tabs">
            <button type="button" class="tab-btn active" onclick="switchTab(event, 'tab-logistica')">Logística</button>
            <button type="button" class="tab-btn" onclick="switchTab(event, 'tab-geral')">Dados Gerais</button>
            <button type="button" class="tab-btn" onclick="switchTab(event, 'tab-financeiro')">Financeiro</button>
            <button type="button" class="tab-btn" onclick="switchTab(event, 'tab-historico')">Histórico</button>
        </div>

        <form id="treinamentoFormSide" style="display: flex; flex-direction: column; height: calc(100% - 120px);">
            <input type="hidden" id="modalTreinamentoId" name="id">
            
            <div class="side-panel-body scrollable">
                <!-- ABA 1: LOGÍSTICA -->
                <div id="tab-logistica" class="tab-content active">
                    <div class="form-section-container">
                        <div class="form-section-header">
                            <div class="form-section-title"><i class="fas fa-plane-departure"></i> Logística</div>
                        </div>
                        <div class="form-group-full">
                            <label>Horário de Saída</label>
                            <input type="datetime-local" id="modalHoraSaida" name="hora_saida">
                        </div>
                        <div class="form-group-full">
                            <label>Horário de Retorno</label>
                            <input type="datetime-local" id="modalHoraRetorno" name="horario_retorno">
                        </div>
                        <div class="form-group-full">
                            <label>Transporte</label>
                            <input type="text" id="modalTransporte" name="transporte">
                        </div>
                        <div class="form-row" style="display:flex; gap:10px;">
                             <div class="form-group" style="flex:1;"><label>Qtd Staffs</label><input type="number" id="modalQtdStaffs"></div>
                             <div class="form-group" style="flex:1;"><label>Equipes</label><input type="number" id="modalQtdEquipes"></div>
                        </div>
                        <div class="form-group-full">
                            <label>Coordenador Interno</label>
                            <input type="text" id="modalCoordInterno" name="coordenador_interno">
                        </div>
                        <div class="form-group-full">
                            <label>Obs Logística</label>
                            <textarea id="modalObsLogistica" name="obs_logistica" style="height:80px;"></textarea>
                        </div>
                    </div>
                </div>

                <!-- ABA 2: DADOS GERAIS -->
                <div id="tab-geral" class="tab-content">
                    <div class="form-section-container">
                        <div class="form-group-full">
                            <label>Nome do Negócio</label>
                            <input type="text" id="modalNomeNegocio" name="nomeNegocio" readonly>
                        </div>
                        <div class="form-group-full">
                            <label>Data</label>
                            <input type="date" id="modalDataEvento" name="dataEvento">
                        </div>
                        <div class="form-group-full">
                            <label>Local</label>
                            <input type="text" id="modalLocalEvento" name="localEvento">
                        </div>
                        <div class="form-group-full">
                            <label>Participantes</label>
                            <input type="number" id="modalParticipantes">
                        </div>
                        <div class="form-group-full">
                            <label>Obs Gerais</label>
                            <textarea id="modalObservacoes" name="observacoes" style="height:100px;"></textarea>
                        </div>
                    </div>
                </div>

                <!-- ABA 3: FINANCEIRO -->
                <div id="tab-financeiro" class="tab-content">
                    <div class="form-section-container">
                        <div class="form-section-header">
                            <div class="form-section-title"><i class="fas fa-hand-holding-usd"></i> Gestão Financeira da Equipe</div>
                        </div>
                        
                        <div class="finance-global-controls" style="padding: 15px; background: #f1f5f9; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px;">
                            <div class="form-group" style="margin:0; flex: 1;">
                                <label style="margin-bottom: 5px; font-weight: 600;">Período Padrão (Todos):</label>
                                <select id="financeGlobalPeriod" class="form-control" onchange="window.financeiro.aplicarPeriodoGlobal(this.value)">
                                    <option value="cheio">Período Cheio (Diária Inteira)</option>
                                    <option value="meio">Meio Período (Meia Diária)</option>
                                </select>
                            </div>
                            <div id="financeSummary" style="text-align: right; font-weight: bold; color: #1e293b;">
                                Total Geral: <span id="financeTotalGeral" style="color: #059669; font-size: 1.2rem;">R$ 0,00</span>
                            </div>
                        </div>

                        <div id="financeStaffListContainer" class="scrollable" style="max-height: 400px; border: 1px solid #e2e8f0; border-radius: 8px;">
                            <table class="finance-table" style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
                                <thead style="background: #f8fafc; position: sticky; top: 0; z-index: 10;">
                                    <tr style="border-bottom: 1px solid #e2e8f0; text-align: left;">
                                        <th style="padding: 12px;">Staff / Função</th>
                                        <th style="padding: 12px; width: 120px;">Diária (R$)</th>
                                        <th style="padding: 12px; width: 150px;">Bônus</th>
                                        <th style="padding: 12px; width: 100px;">Voucher</th>
                                        <th style="padding: 12px; width: 120px; text-align: right;">Total</th>
                                    </tr>
                                </thead>
                                <tbody id="financeStaffTableBody">
                                    <!-- Carregado via JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- ABA 4: HISTÓRICO -->
                <div id="tab-historico" class="tab-content">
                    <div id="lista-logs-interna">Carregando...</div>
                </div>
            </div>

            <div class="side-panel-footer">
                <button type="button" class="btn-cancel" onclick="fecharSidePanel()">Fechar</button>
                <button type="submit" class="btn-save">Salvar Alterações</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal de Histórico (Logs) -->
<div id="JANELA_LOGS_FINAL" class="modal-obs-overlay" style="display: none;">
    <div class="modal-obs-content" style="width: 750px; max-width: 95%; height: 80vh;">
        
        <div class="header-modal" style="padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; flex-shrink: 0;">
            <h3 style="margin: 0; font-size: 18px; color: #1e293b;"><i class="fas fa-history"></i> Histórico do Treinamento</h3>
            <button type="button" onclick="fecharModalLogs()" style="background:none; border:none; font-size:30px; cursor:pointer; color: #94a3b8; line-height: 1;">&times;</button>
        </div>
        
        <div id="CONTEUDO_LOGS_FINAL" style="flex: 1; overflow-y: auto; padding: 20px; background: #ffffff;">
            <!-- Conteúdo carregado via JS -->
        </div>

        <div class="modal-footer" style="padding: 15px 20px; border-top: 1px solid #eee; text-align: right; background: #f8fafc; flex-shrink: 0;">
            <button type="button" class="btn-tertiary" onclick="fecharModalLogs()" style="padding: 10px 25px; border-radius: 5px; cursor: pointer;">Fechar</button>
        </div>
    </div>
</div>

        <!-- Modal de Impressão (Uniformes e Facilitadores) -->
        <div id="JANELA_IMPRESSAO_SISTEMA" class="modal-obs-overlay" style="display: none;">
            <div class="modal-obs-content" style="width: 850px !important; max-width: 95% !important; height: 90vh !important; background: white !important; border-radius: 12px !important; overflow: hidden !important; display: flex !important; flex-direction: column !important; box-shadow: 0 20px 60px rgba(0,0,0,0.5) !important;">
                
                <div class="header-modal no-print" style="padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; flex-shrink: 0;">
                    <h3 id="titulo_janela_impressao" style="margin: 0; font-size: 18px; color: #1e293b;">Relatório</h3>
                    <div style="display: flex; gap: 10px;">
                        <button type="button" class="no-print" onclick="imprimirConteudoTabela()" style="background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                            <i class="fas fa-print"></i> Imprimir / PDF
                        </button>
                        <button type="button" onclick="fecharModalImpressao()" style="background:none; border:none; font-size:24px; cursor:pointer; color: #999;">&times;</button>
                    </div>
                </div>
                
                <!-- Área que será impressa -->
                <div id="CONTEUDO_IMPRESSAO_SISTEMA" style="flex: 1; overflow-y: auto; padding: 40px; background: #ffffff; color: #000;">
                    <!-- Conteúdo dinâmico -->
                </div>

                <div class="modal-footer" style="padding: 10px 20px; border-top: 1px solid #eee; text-align: right; background: #f8fafc; flex-shrink: 0;">
                    <button type="button" class="btn-tertiary" onclick="fecharModalImpressao()">Fechar</button>
                </div>
            </div>
        </div>
    

    <script type="module" src="js/auth-check.js"></script>
    <script type="module" src="js/script.js"></script>
    <script type="module" src="js/alocacao-main.js"></script>
    <script type="module" src="js/alocacao-financeiro.js"></script>
    <script type="module" src="js/alocacao-reports.js"></script>
</body>
</html>
