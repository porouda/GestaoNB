<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importar Treinamentos - Sistema de Treinamentos</title>
    <link rel="stylesheet" href="css/importar-treinamentos.css">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="sidebar" id="sidebar">
        <!-- Menu carregado dinamicamente -->
    </div>

    <div class="main-content">
        <header class="page-header">
            <h1 class="page-title">Importar Treinamentos do Excel</h1>
        </header>

        <div class="container-full">
            <div class="bento-filter-row" style="justify-content: center; margin-bottom: 30px;"> 
                <form action="https://nbwhats.vps-kinghost.net/webhook/54e08ba2-4602-418c-bad6-ffbaa66890d5" method="get" style="display:inline;">
                    <button type="submit" class="btn btn-success" style="background: var(--success-color); color: white; border: none; padding: 12px 24px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;">
                        <i class="fas fa-sync-alt"></i> Exportar Hubspot
                    </button>
                </form>

                <form action="https://nbwhats.vps-kinghost.net/webhook/17007ab8-c4ed-48b8-8bbb-2059db4a775b" method="get" style="display:inline;">
                    <button type="submit" class="btn btn-success" style="background: var(--primary-light); color: white; border: none; padding: 12px 24px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;">
                        <i class="fas fa-database"></i> Realizar Backup
                    </button>
                </form>
            </div>

            <div class="upload-container" style="background: white; border: 1px solid var(--border-color); border-radius: var(--radius); padding: 40px; text-align: center; max-width: 800px; margin: 0 auto; box-shadow: var(--shadow-md);">
                <h3 style="font-size: 1.5rem; font-weight: 800; color: var(--primary-color); margin-bottom: 10px;">Importar do Excel</h3>
                <p style="color: var(--text-muted); margin-bottom: 30px;">Selecione um arquivo Excel (.xlsx ou .xls) com os dados dos treinamentos.</p>
                
                <div class="upload-area" id="uploadArea" style="border: 2px dashed var(--border-color); border-radius: 16px; padding: 60px 40px; transition: all 0.3s; cursor: pointer; background: #f8fafc;">
                    <i class="fas fa-file-excel" style="font-size: 4rem; color: var(--accent-color); margin-bottom: 20px;"></i>
                    <p style="font-weight: 600; color: var(--text-main);">Arraste e solte o arquivo aqui ou clique para selecionar</p>
                    <input type="file" id="excelFile" accept=".xlsx,.xls" style="display: none;" />
                </div>

                <div class="progress-area" id="progressArea" style="display: none;">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <p id="progressText">0%</p>
                </div>

                <div class="results-area" id="resultsArea" style="display: none;">
                    <h4>Resultados da Importação</h4>
                    <div id="resultsContent"></div>
                </div>

                <button class="btn btn-primary" id="importBtn" style="display: none;">Importar Dados</button>
            </div>
        </div>
    </div>
    <script src="js/auth-check.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/importacao.js"></script>
</body>
</html>
